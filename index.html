        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; line-height: 1.6; max-width: 900px; margin: auto; background: #f0f2f5; color: #333; }
        h1, h2 { text-align: center; color: #1a73e8; margin-bottom: 5px; }
        .subtitle { text-align: center; font-size: 13px; color: #666; margin-bottom: 25px; }
        
        section { margin-bottom: 25px; padding: 25px; border-radius: 12px; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        input[type="text"], textarea { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; margin-top: 8px; }
        textarea { resize: vertical; min-height: 60px; }
        
        button { padding: 12px 15px; cursor: pointer; background: #1a73e8; color: white; border: none; border-radius: 6px; font-weight: bold; width: 100%; margin-top: 10px; transition: background 0.2s; font-size: 15px; }
        button:hover { background: #1557b0; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .secondary-btn { background: #5f6368; margin-top: 5px; }
        
        .result-label { font-size: 12px; font-weight: bold; color: #555; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px; }
        
        .cipher-box { 
            margin-top: 5px; 
            padding: 12px 20px; 
            border: 1px dashed #bbb; 
            background: #fafafa; 
            border-radius: 8px; 
            word-wrap: break-word; 
            min-height: 40px; 
            text-align: center; 
        }
        
        #step3Cipher {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            padding: 20px;
            font-size: 20px;
            line-height: 1.6;
            text-align: left;
            white-space: nowrap;
            overflow-x: auto;
            font-family: 'PigpenCipher', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .symbol-wrapper, .letter-wrapper {
            display: inline-block;
            transition: margin 0.2s;
        }

        .plaintext-box { 
            margin-top: 5px; 
            padding: 15px 15px;
            border: 1px solid #cce8d6; 
            background: #e6f4ea; 
            border-radius: 8px; 
            word-wrap: break-word; 
            min-height: 30px; 
            text-align: center; 
            font-size: 16px; 
            font-weight: bold; 
            color: #1e8e3e; 
            letter-spacing: 1px; 
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        #step3Plaintext {
            font-size: 12px; 
        }
        
        #canvasOutput { width: 100%; border-radius: 8px; margin-top: 10px; display: none; border: 2px solid #1a73e8; background: #000; }
        .status-badge { display: block; padding: 8px 10px; border-radius: 6px; font-size: 14px; background: #eee; margin-bottom: 10px; text-align: center; font-weight: bold; }
        
        /* THE FIX: Adjusted cipher font size and spacing */
        .font-mode { 
            font-family: 'PigpenCipher', sans-serif; 
            font-size: 26px; 
            color: #333; 
            letter-spacing: 4px; 
            line-height: 1.6;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <h1>🔐 Symbol Translator Pro</h1>
    <div class="subtitle">Custom Pigpen TTF Font Edition</div>

    <section>
        <h2>Step 1: Encode Message</h2>
        <input type="text" id="inputText" placeholder="Type plain English message..." oninput="encode()">
        <div class="result-label">Cipher Output:</div>
        <div id="step1Cipher" class="cipher-box font-mode"></div>
        <textarea id="shareableCode" readonly rows="1" placeholder="Scrambled code..."></textarea>
        <button class="secondary-btn" onclick="copyToClipboard('shareableCode')">📋 Copy Scrambled Code</button>
    </section>

    <section>
        <h2>Step 2: Decode Message</h2>
        <textarea id="inputCode" placeholder="Paste scrambled code here (or use button)..." oninput="decode()"></textarea>
        <button class="secondary-btn" id="pasteBtn" onclick="pasteFromClipboard('inputCode')">📋 Paste Scrambled Code</button>
        <div class="result-label">Cipher View:</div>
        <div id="step2Cipher" class="cipher-box font-mode"></div>
        <div class="result-label">English Translation:</div>
        <div id="step2Plaintext" class="plaintext-box" style="display:block;"></div>
    </section>

    <section>
        <h2>Step 3: AI Image Scan</h2>
        <div id="status" class="status-badge">⏳ Loading OpenCV Core...</div>
        <button id="camBtn" disabled onclick="document.getElementById('fileInput').click()">📸 Upload Image to Scan</button>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="processImage(this)">
        <canvas id="canvasOutput"></canvas>
        
        <div id="scanLabel1" style="display:none;"></div>
        <div id="step3Cipher" style="display:none;"></div>
        
        <div class="result-label" style="display:none;" id="scanLabel2">English Translation:</div>
        <div id="step3Plaintext" class="plaintext-box" style="display:none;"></div>
    </section>

    <div id="toast" class="toast"></div>

    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript"></script>

    <script>
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.opacity = '1';
            t.style.pointerEvents = 'auto';
            setTimeout(() => {
                t.style.opacity = '0';
                t.style.pointerEvents = 'none';
            }, 3000);
        }

        let lastScanResult = "";
        const aiSymbolMap = {
            "0,1,1,0,0": "A", "0,1,1,1,0": "B", "0,0,1,1,0": "C", "1,1,1,0,0": "D", "1,1,1,1,0": "E", "1,0,1,1,0": "F", "1,1,0,0,0": "G", "1,1,0,1,0": "H", "1,0,0,1,0": "I",
            "tri_down,0": "J", "tri_right,0": "K", "tri_left,0": "L", "tri_up,0": "M",
            "0,1,1,0,1": "N", "0,1,1,1,1": "O", "0,0,1,1,1": "P", "1,1,1,0,1": "Q", "1,1,1,1,1": "R", "1,0,1,1,1": "S", "1,1,0,0,1": "T", "1,1,0,1,1": "U", "1,0,0,1,1": "V",
            "tri_down,1": "W", "tri_right,1": "X", "tri_left,1": "Y", "tri_up,1": "Z"
        };

        function encode() {
            let text = document.getElementById("inputText").value.toUpperCase();
            document.getElementById("step1Cipher").innerText = text;
            document.getElementById("shareableCode").value = btoa(encodeURIComponent(text));
        }

        function decode() {
            try {
                let val = document.getElementById("inputCode").value.trim();
                if(!val) {
                    document.getElementById("step2Cipher").innerText = "";
                    document.getElementById("step2Plaintext").innerText = "";
                    return;
                }
                let decoded = decodeURIComponent(atob(val)).toUpperCase();
                document.getElementById("step2Cipher").innerText = decoded;
                document.getElementById("step2Plaintext").innerText = decoded;
            } catch(e) { 
                document.getElementById("step2Plaintext").innerText = "Invalid code format"; 
            }
        }

        function copyToClipboard(id) { 
            const el = document.getElementById(id);
            el.select(); 
            try {
                document.execCommand("copy"); 
                showToast("Code copied!");
            } catch(e) {
                showToast("Copy failed. Please manually select and copy.");
            }
        }

        async function pasteFromClipboard(id) {
            try {
                const text = await navigator.clipboard.readText();
                if (text) {
                    document.getElementById(id).value = text;
                    decode();
                    showToast("Code pasted!");
                }
            } catch (err) {
                showToast("System paste blocked. Please use Ctrl+V (or Cmd+V) in the text area.");
                document.getElementById(id).focus();
            }
        }

        let checkCV = setInterval(() => {
            if (typeof cv !== 'undefined' && cv.Mat) {
                document.getElementById('status').innerText = "AI Vision Ready ✅";
                document.getElementById('status').style.background = "#d4edda";
                document.getElementById('camBtn').disabled = false;
                clearInterval(checkCV);
            }
        }, 1000);

        function processImage(input) {
            if (!input.files[0]) return;
            const img = new Image();
            img.src = URL.createObjectURL(input.files[0]);
            img.onload = function() {
                let src = cv.imread(img);
                let gray = new cv.Mat(), thresh = new cv.Mat();
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                cv.adaptiveThreshold(gray, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 21, 7);
                
                let contours = new cv.MatVector(), hierarchy = new cv.Mat();
                cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
                
                let rects = [];
                for (let i = 0; i < contours.size(); ++i) {
                    let r = cv.boundingRect(contours.get(i));
                    if (r.width > 10 && r.height > 10) rects.push(r);
                }

                rects.sort((a,b) => a.y - b.y);
                let lines = []; if(rects.length > 0) {
                    let curLine = [rects[0]];
                    for(let i=1; i<rects.length; i++) {
                        if(Math.abs(rects[i].y - curLine[0].y) < 50) curLine.push(rects[i]);
                        else { 
                            curLine.sort((a,b)=>a.x-b.x); 
                            lines.push(curLine); 
                            curLine = [rects[i]]; 
                        }
                    }
                    curLine.sort((a,b)=>a.x-b.x); 
                    lines.push(curLine);
                }

                let finalSymbolHtml = "";
                let finalPlainHtml = "";
                let plainTextRaw = "";
                let displayMat = src.clone();

                lines.forEach((line) => {
                    line.forEach((r, i) => {
                        cv.rectangle(displayMat, new cv.Point(r.x, r.y), new cv.Point(r.x+r.width, r.y+r.height), [0,255,0,255], 2);
                        
                        let gapPixels = 0;
                        if (i > 0) {
                            let prevR = line[i-1];
                            gapPixels = r.x - (prevR.x + prevR.width);
                        }

                        let roi = thresh.roi(r);
                        let m = new cv.Mat(); 
                        cv.resize(roi, m, new cv.Size(100, 100));
                        let char = aiSymbolMap[analyzeRobust(m)] || "?";
                        
                        let visualMargin = Math.max(0, gapPixels * 0.65); 
                        
                        finalSymbolHtml += `<span class="symbol-wrapper" style="margin-left: ${visualMargin}px">${char}</span>`;
                        finalPlainHtml += `<span class="letter-wrapper" style="margin-left: ${visualMargin}px">${char}</span>`;
                        
                        plainTextRaw += char;
                        roi.delete(); m.delete();
                    });
                    
                    finalSymbolHtml += "<div style='width: 100%; height: 10px;'></div>";
                    finalPlainHtml += "<div style='width: 100%; height: 10px;'></div>";
                    plainTextRaw += " ";
                });

                lastScanResult = plainTextRaw.trim();
                
                const cipherOutput = document.getElementById("step3Cipher");
                cipherOutput.innerHTML = finalSymbolHtml;

                const plainOutput = document.getElementById("step3Plaintext");
                plainOutput.innerHTML = finalPlainHtml;
                plainOutput.style.display = "flex";
                
                document.getElementById("scanLabel2").style.display = "block";
                
                cv.imshow('canvasOutput', displayMat);
                document.getElementById("canvasOutput").style.display = "block";
                src.delete(); gray.delete(); thresh.delete(); contours.delete(); hierarchy.delete(); displayMat.delete();
            };
        }

        function analyzeRobust(m) {
            const count = (yS, yE, xS, xE) => cv.countNonZero(m.roi({x: xS, y: yS, width: xE-xS, height: yE-yS}));
            const total = cv.countNonZero(m);
            let centerDotDensity = count(40, 60, 40, 60);
            let hasDot = centerDotDensity > 75 ? 1 : 0; 

            let tl = count(0, 20, 0, 20);
            let tr = count(0, 20, 80, 100);
            let bl = count(80, 100, 0, 20);
            let br = count(80, 100, 80, 100);
            let cornerThresh = total * 0.04;

            if (bl < cornerThresh && br < cornerThresh && (tl > cornerThresh || tr > cornerThresh)) return `tri_down,${hasDot}`;
            if (tl < cornerThresh && tr < cornerThresh && (bl > cornerThresh || br > cornerThresh)) return `tri_up,${hasDot}`;
            if (tr < cornerThresh && br < cornerThresh && (tl > cornerThresh || bl > cornerThresh)) return `tri_right,${hasDot}`;
            if (tl < cornerThresh && bl < cornerThresh && (tr > cornerThresh || br > cornerThresh)) return `tri_left,${hasDot}`;

            let lineThresh = total * 0.1;
            let t = count(0, 15, 20, 80) > lineThresh ? 1 : 0;
            let r = count(20, 80, 85, 100) > lineThresh ? 1 : 0;
            let b = count(85, 100, 20, 80) > lineThresh ? 1 : 0;
            let l = count(20, 80, 0, 15) > lineThresh ? 1 : 0;

            return `${t},${r},${b},${l},${hasDot}`;
        }
    </script>
</body>
</html>
