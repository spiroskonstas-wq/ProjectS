<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Symbol AI - Pointy Logic Edition</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; max-width: 850px; margin: auto; background-color: #f0f2f5; color: #333; }
        h1, h2 { text-align: center; color: #1a73e8; }
        section { margin-bottom: 25px; padding: 25px; border-radius: 12px; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        
        input, textarea { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; margin-top: 8px; }
        button { padding: 14px 20px; cursor: pointer; background: #1a73e8; color: white; border: none; border-radius: 6px; font-weight: bold; width: 100%; margin-top: 10px; }
        button:hover { background: #1557b0; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        #output, #decodedSymbols, #scanResult { margin-top: 15px; min-height: 50px; padding: 15px; border: 1px solid #eee; background: #fafafa; border-radius: 8px; word-wrap: break-word; }
        .symbol { display: inline-block; margin: 4px; vertical-align: middle; }
        
        #canvasOutput { width: 100%; border-radius: 8px; margin-top: 10px; display: none; border: 2px solid #1a73e8; }
        #scanResult { font-size: 50px; color: #1e8e3e; font-weight: bold; text-align: center; letter-spacing: 15px; min-height: 65px; }
        .status-badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 12px; background: #eee; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>🔐 Pigpen Symbol AI</h1>

    <section>
        <h2>1. Encoder & Decoder</h2>
        <input type="text" id="inputText" placeholder="Type text to encode..." oninput="encode()">
        <div id="output"></div>
        <textarea id="inputCode" rows="2" placeholder="Paste scrambled code to decode..." oninput="decode()" style="margin-top:20px;"></textarea>
        <div id="decodedSymbols"></div>
        <div id="decodedOutput" style="font-weight: bold; color: #28a745; font-size: 1.5em; text-align: center;"></div>
    </section>

    <section>
        <h2>2. AI Camera Scan</h2>
        <div id="status" class="status-badge">⏳ Loading AI Engine...</div>
        <button id="camBtn" disabled onclick="document.getElementById('fileInput').click()">📸 Scan Handwriting</button>
        <input type="file" id="fileInput" accept="image/*" capture="camera" style="display:none" onchange="processImage(this)">
        <canvas id="canvasOutput"></canvas>
        <div id="scanResult"></div>
    </section>

    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript"></script>

    <script>
        /* --- SYMBOL MAPS --- */
        const symbols = {
            A: sq(0,1,1,0), B: sq(0,1,1,1), C: sq(0,0,1,1), D: sq(1,1,1,0), E: sq(1,1,1,1), F: sq(1,0,1,1),
            G: sq(1,1,0,0), H: sq(1,1,0,1), I: sq(1,0,0,1), J: tr("down"), K: tr("right"), L: tr("left"),
            M: tr("up"), N: sq(0,1,1,0,1), O: sq(0,1,1,1,1), P: sq(0,0,1,1,1), Q: sq(1,1,1,0,1), R: sq(1,1,1,1,1),
            S: sq(1,0,1,1,1), T: sq(1,1,0,0,1), U: sq(1,1,0,1,1), V: sq(1,0,0,1,1), W: tr("down",1), X: tr("right",1),
            Y: tr("left",1), Z: tr("up",1)
        };

        const aiMap = {
            "0,1,1,0,0": "A", "0,1,1,1,0": "B", "0,0,1,1,0": "C", "1,1,1,0,0": "D", "1,1,1,1,0": "E", "1,0,1,1,0": "F",
            "1,1,0,0,0": "G", "1,1,0,1,0": "H", "1,0,0,1,0": "I", "0,1,1,0,1": "N", "0,1,1,1,1": "O", "0,0,1,1,1": "P",
            "1,1,1,0,1": "Q", "1,1,1,1,1": "R", "1,0,1,1,1": "S", "1,1,0,0,1": "T", "1,1,0,1,1": "U", "1,0,0,1,1": "V",
            "0,0,1,1,0_T": "J", "1,1,0,0,0_T": "K", "1,0,0,1,0_T": "L", "0,1,1,0,0_T": "M",
            "0,0,1,1,1_T": "W", "1,1,0,0,1_T": "X", "1,0,0,1,1_T": "Y", "0,1,1,0,1_T": "Z",
            // Fuzzy Logic for L (<)
            "0,0,0,1,0_T": "L", "1,0,1,1,0_T": "L", "0,0,1,1,0_T": "L" 
        };

        function sq(t,r,b,l,d=0){
            let s=`<svg width="40" height="40" stroke="black" stroke-width="3" fill="none">`;
            if(t)s+=`<line x1="5" y1="5" x2="35" y2="5"/>`; if(r)s+=`<line x1="35" y1="5" x2="35" y2="35"/>`;
            if(b)s+=`<line x1="5" y1="35" x2="35" y2="35"/>`; if(l)s+=`<line x1="5" y1="5" x2="5" y2="35"/>`;
            if(d)s+=`<circle cx="20" cy="20" r="3" fill="black"/>`; return s+`</svg>`;
        }
        function tr(p,d=0){
            let s=`<svg width="40" height="40" stroke="black" stroke-width="3" fill="none">`;
            if(p=="up")s+=`<line x1="20" y1="5" x2="5" y2="35"/><line x1="20" y1="5" x2="35" y2="35"/>`;
            if(p=="right")s+=`<line x1="5" y1="5" x2="35" y2="20"/><line x1="5" y1="35" x2="35" y2="20"/>`;
            if(p=="left")s+=`<line x1="35" y1="5" x2="5" y2="20"/><line x1="35" y1="35" x2="5" y2="20"/>`;
            if(p=="down")s+=`<line x1="5" y1="5" x2="20" y2="35"/><line x1="35" y1="5" x2="20" y2="35"/>`;
            if(d)s+=`<circle cx="20" cy="20" r="3" fill="black"/>`; return s+`</svg>`;
        }

        /* --- LOGIC --- */
        function encode(){
            let v="", t=document.getElementById("inputText").value.toUpperCase();
            for(let char of t){ v+=symbols[char]?`<span class="symbol">${symbols[char]}</span>`:(char==" "?"&nbsp;":char); }
            document.getElementById("output").innerHTML=v;
        }
        function decode(){
            try {
                let d=atob(document.getElementById("inputCode").value).toUpperCase(), v="", t="";
                for(let char of d){ v+=symbols[char]?`<span class="symbol">${symbols[char]}</span>`:char; t+=char; }
                document.getElementById("decodedSymbols").innerHTML=v; document.getElementById("decodedOutput").innerText=t;
            } catch(e){}
        }

        /* --- AI --- */
        let cvCheck=setInterval(()=>{ if(window.cv && cv.Mat){ document.getElementById('status').innerText="AI Ready ✅"; document.getElementById('camBtn').disabled=false; clearInterval(cvCheck); }},1000);

        function processImage(input){
            const img=new Image(); img.src=URL.createObjectURL(input.files[0]);
            img.onload=function(){
                let src=cv.imread(img); let scale=800/src.cols;
                cv.resize(src, src, new cv.Size(800, src.rows*scale));
                let gray=new cv.Mat(), thresh=new cv.Mat();
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                cv.adaptiveThreshold(gray, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 21, 6);
                let contours=new cv.MatVector(), hierarchy=new cv.Mat();
                cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
                let found=[];
                for(let i=0; i<contours.size(); ++i){
                    let rect=cv.boundingRect(contours.get(i));
                    if(rect.width>20 && rect.height>20 && rect.width<400){
                        let roi=thresh.roi(rect); let padded=new cv.Mat();
                        cv.copyMakeBorder(roi, padded, 15,15,15,15, cv.BORDER_CONSTANT, [0,0,0,255]);
                        cv.resize(padded, padded, new cv.Size(60,60));
                        let key=analyze(padded);
                        found.push({x: rect.x, char: aiMap[key]||"?"});
                        cv.rectangle(src, new cv.Point(rect.x, rect.y), new cv.Point(rect.x+rect.width, rect.y+rect.height), [0,255,0,255], 3);
                        roi.delete(); padded.delete();
                    }
                }
                found.sort((a,b)=>a.x-b.x);
                document.getElementById("scanResult").innerText=found.map(f=>f.char).join("");
                document.getElementById("canvasOutput").style.display="block"; cv.imshow('canvasOutput', src);
                src.delete(); gray.delete(); thresh.delete(); contours.delete(); hierarchy.delete();
            };
        }

        function analyze(norm){
            const d=(x,y,w,h)=>{ let z=norm.roi({x,y,width:w,height:h}); let p=cv.countNonZero(z); z.delete(); return p/(w*h); };
            const lines=[d(10,0,40,15)>0.1?1:0, d(45,10,15,40)>0.1?1:0, d(10,45,40,15)>0.1?1:0, d(0,10,15,40)>0.1?1:0];
            const corners=d(0,0,12,12)+d(48,0,12,12)+d(0,48,12,12)+d(48,48,12,12);
            const center=d(20,20,20,20);
            const isPointy=(center>0.1)&&(corners<0.25);
            const dot=d(22,22,16,16)>0.08;
            let key=lines.join(',')+","+ (dot?1:0); if(isPointy) key+="_T"; return key;
        }
    </script>
</body>
</html>
