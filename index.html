<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Symbol AI - HELLO Calibration</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #eceff1; max-width: 500px; margin: auto; text-align: center; }
        section { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 15px; }
        button { background: #1a73e8; color: white; border: none; padding: 18px; border-radius: 8px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; }
        #canvasOutput { width: 100%; border-radius: 8px; margin-top: 10px; display: none; }
        #result { font-size: 60px; color: #1e8e3e; font-weight: bold; margin-top: 20px; letter-spacing: 15px; }
        .status { font-size: 14px; color: #5f6368; margin-bottom: 15px; }
    </style>
</head>
<body>

    <h2>🔐 Symbol AI Decoder</h2>

    <section>
        <div id="status" class="status">Loading AI Engine...</div>
        <button id="camBtn" disabled onclick="document.getElementById('fileInput').click()">📸 Scan HELLO Symbols</button>
        <input type="file" id="fileInput" accept="image/*" capture="camera" style="display:none" onchange="processImage(this)">
        <canvas id="canvasOutput"></canvas>
        <div id="result"></div>
    </section>

    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript"></script>

    <script>
        const symbolMap = {
            "1,1,0,1,0": "H", 
            "1,1,1,1,0": "E", 
            "0,1,1,0,0": "L", 
            "0,1,1,1,1": "O", // U-Shape + Dot
            "0,1,1,1,0": "B", // U-Shape No Dot
            "1,1,1,0,0": "D", "1,0,1,1,0": "F"
        };

        let checkCV = setInterval(() => {
            if (typeof cv !== 'undefined' && cv.Mat) {
                document.getElementById('status').innerText = "AI Ready ✅";
                document.getElementById('camBtn').disabled = false;
                clearInterval(checkCV);
            }
        }, 1000);

        function processImage(input) {
            if (!input.files[0]) return;
            const resDiv = document.getElementById("result");
            resDiv.innerText = "";
            const img = new Image();
            img.src = URL.createObjectURL(input.files[0]);
            
            img.onload = function() {
                let src = cv.imread(img);
                let scale = 800 / src.cols;
                cv.resize(src, src, new cv.Size(800, src.rows * scale), 0, 0, cv.INTER_AREA);
                
                let gray = new cv.Mat();
                let thresh = new cv.Mat();
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                
                // Adaptive Threshold with LIGHTER subtraction to keep dots
                cv.adaptiveThreshold(gray, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 21, 6);

                let M = cv.Mat.ones(3, 3, cv.CV_8U);
                cv.dilate(thresh, thresh, M, new cv.Point(-1, -1), 1);
                
                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
                
                let found = [];
                for (let i = 0; i < contours.size(); ++i) {
                    let rect = cv.boundingRect(contours.get(i));
                    if (rect.width > 20 && rect.height > 20 && rect.width < 400) {
                        let roi = thresh.roi(rect);
                        let padded = new cv.Mat();
                        cv.copyMakeBorder(roi, padded, 15, 15, 15, 15, cv.BORDER_CONSTANT, [0,0,0,255]);
                        cv.resize(padded, padded, new cv.Size(60, 60));

                        let analysis = analyzeRobust(padded);
                        let key = analysis.lines.join(',') + "," + (analysis.hasDot ? 1 : 0);
                        let char = symbolMap[key] || "?";

                        found.push({ x: rect.x, char: char });
                        cv.rectangle(src, new cv.Point(rect.x, rect.y), new cv.Point(rect.x+rect.width, rect.y+rect.height), [0, 255, 0, 255], 3);
                        roi.delete(); padded.delete();
                    }
                }

                found.sort((a, b) => a.x - b.x);
                resDiv.innerText = found.map(f => f.char).join("");
                document.getElementById("canvasOutput").style.display = "block";
                cv.imshow('canvasOutput', src);
                
                src.delete(); gray.delete(); thresh.delete(); contours.delete(); hierarchy.delete(); M.delete();
            };
        }

        function analyzeRobust(norm) {
            const getDensity = (x, y, w, h) => {
                let zone = norm.roi({x, y, width: w, height: h});
                let p = cv.countNonZero(zone);
                zone.delete();
                return p / (w * h);
            };

            const lines = [
                getDensity(15, 0, 30, 14) > 0.15 ? 1 : 0,  // Top
                getDensity(46, 15, 14, 30) > 0.15 ? 1 : 0, // Right
                getDensity(15, 46, 30, 14) > 0.15 ? 1 : 0, // Bottom
                getDensity(0, 15, 14, 30) > 0.15 ? 1 : 0   // Left
            ];

            // Ultra-Sensitive Dot Check: Looking in a wider 20x20 center box
            const hasDot = getDensity(20, 20, 20, 20) > 0.05;

            return { lines, hasDot };
        }
    </script>
</body>
</html>
