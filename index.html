<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Symbol AI: Master Translator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; line-height: 1.6; max-width: 800px; margin: auto; background-color: #f0f2f5; color: #333; }
        h1, h2 { text-align: center; color: #1a73e8; margin-bottom: 10px; }
        section { margin-bottom: 25px; padding: 25px; border-radius: 12px; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        
        /* UI Elements */
        input, textarea { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; margin-top: 8px; font-family: inherit; }
        button { padding: 12px 20px; cursor: pointer; background: #1a73e8; color: white; border: none; border-radius: 6px; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #1557b0; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        /* Symbol Displays */
        #output, #decodedSymbols, #scanResult { margin-top: 15px; min-height: 50px; padding: 15px; border: 1px solid #eee; background: #fafafa; border-radius: 8px; word-wrap: break-word; }
        .symbol { display: inline-block; margin: 4px; vertical-align: middle; }
        
        /* AI Scan Specifics */
        #canvasOutput { width: 100%; border-radius: 8px; margin-top: 10px; display: none; border: 2px solid #1a73e8; }
        #scanResult { font-size: 45px; color: #1e8e3e; font-weight: bold; text-align: center; letter-spacing: 12px; min-height: 60px; }
        .status-badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 12px; background: #eee; margin-bottom: 10px; transition: 0.5s; }
        .label { font-weight: bold; display: block; margin-top: 15px; font-size: 0.9em; color: #666; }
    </style>
</head>
<body>

    <h1>🔐 Pigpen Symbol Suite</h1>

    <section>
        <h2>1. Encode (Text to Symbol)</h2>
        <input type="text" id="inputText" placeholder="Type English here..." oninput="encode()">
        
        <span class="label">Visual Preview:</span>
        <div id="output"></div>
        
        <span class="label">Secret Scrambled Code:</span>
        <textarea id="shareableCode" readonly rows="2" placeholder="Send this to a friend..."></textarea>
        <button onclick="copyToClipboard('shareableCode')">Copy Scrambled Code</button>
    </section>

    <section>
        <h2>2. Decode (Code to Text)</h2>
        <textarea id="inputCode" rows="2" placeholder="Paste scrambled code here..." oninput="decode()"></textarea>
        <div id="decodedSymbols"></div>
        <div id="decodedOutput" style="font-weight: bold; color: #28a745; font-size: 1.5em; text-align: center; margin-top: 10px;"></div>
    </section>

    <section>
        <h2>3. AI Camera Scan</h2>
        <div id="status" class="status-badge">⏳ Loading OpenCV AI Engine...</div>
        
        <button id="camBtn" disabled onclick="document.getElementById('fileInput').click()">📸 Take Photo of Handwriting</button>
        <input type="file" id="fileInput" accept="image/*" capture="camera" style="display:none" onchange="processImage(this)">
        
        <canvas id="canvasOutput"></canvas>
        <div id="scanResult"></div>
        <p style="font-size: 0.8em; color: #999; text-align: center;">Note: Handwriting recognition works best with clear, dark lines.</p>
    </section>

    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript"></script>

    <script>
        /* --- FULL DICTIONARY (Based on your image) --- */
        // Format: Top, Right, Bottom, Left, Dot
        const symbols = {
            A: square(0,1,1,0), B: square(0,1,1,1), C: square(0,0,1,1),
            D: square(1,1,1,0), E: square(1,1,1,1), F: square(1,0,1,1),
            G: square(1,1,0,0), H: square(1,1,0,1), I: square(1,0,0,1),
            J: triangle("down"), K: triangle("right"), L: triangle("left"), M: triangle("up"),
            N: square(0,1,1,0,1), O: square(0,1,1,1,1), P: square(0,0,1,1,1),
            Q: square(1,1,1,0,1), R: square(1,1,1,1,1), S: square(1,0,1,1,1),
            T: square(1,1,0,0,1), U: square(1,1,0,1,1), V: square(1,0,0,1,1),
            W: triangle("down", true), X: triangle("right", true), Y: triangle("left", true), Z: triangle("up", true)
        };

        const aiSymbolMap = {
            "0,1,1,0,0": "A", "0,1,1,1,0": "B", "0,0,1,1,0": "C",
            "1,1,1,0,0": "D", "1,1,1,1,0": "E", "1,0,1,1,0": "F",
            "1,1,0,0,0": "G", "1,1,0,1,0": "H", "1,0,0,1,0": "I",
            "0,1,1,0,1": "N", "0,1,1,1,1": "O", "0,0,1,1,1": "P",
            "1,1,1,0,1": "Q", "1,1,1,1,1": "R", "1,0,1,1,1": "S",
            "1,1,0,0,1": "T", "1,1,0,1,1": "U", "1,0,0,1,1": "V",
            "0,0,1,1,0_T": "J", "1,1,0,0,0_T": "K", "1,0,0,1,0_T": "L", "0,1,1,0,0_T": "M",
            "0,0,1,1,1_T": "W", "1,1,0,0,1_T": "X", "1,0,0,1,1_T": "Y", "0,1,1,0,1_T": "Z"
        };

        /* --- SVG RENDERING --- */
        function square(top, right, bottom, left, dot=false) {
            let lines = "";
            if (top) lines += `<line x1="5" y1="5" x2="35" y2="5"/>`;
            if (right) lines += `<line x1="35" y1="5" x2="35" y2="35"/>`;
            if (bottom) lines += `<line x1="5" y1="35" x2="35" y2="35"/>`;
            if (left) lines += `<line x1="5" y1="5" x2="5" y2="35"/>`;
            let dotSvg = dot ? `<circle cx="20" cy="20" r="3" fill="black"/>` : "";
            return `<svg width="40" height="40" stroke="black" stroke-width="3" fill="none">${lines}${dotSvg}</svg>`;
        }

        function triangle(type, dot=false) {
            let lines = "";
            if (type === "up") lines += `<line x1="20" y1="5" x2="5" y2="35"/><line x1="20" y1="5" x2="35" y2="35"/>`;
            if (type === "right") lines += `<line x1="5" y1="5" x2="35" y2="20"/><line x1="5" y1="35" x2="35" y2="20"/>`;
            if (type === "left") lines += `<line x1="35" y1="5" x2="5" y2="20"/><line x1="35" y1="35" x2="5" y2="20"/>`;
            if (type === "down") lines += `<line x1="5" y1="5" x2="20" y2="35"/><line x1="35" y1="5" x2="20" y2="35"/>`;
            let dotSvg = dot ? `<circle cx="20" cy="20" r="3" fill="black"/>` : "";
            return `<svg width="40" height="40" stroke="black" stroke-width="3" fill="none">${lines}${dotSvg}</svg>`;
        }

        /* --- LOGIC: ENCODE/DECODE --- */
        function encode() {
            let text = document.getElementById("inputText").value.toUpperCase();
            let visual = ""; let code = "";
            for (let char of text) {
                if(symbols[char]) {
                    visual += `<span class="symbol">${symbols[char]}</span>`;
                } else {
                    visual += (char === " " ? "&nbsp;&nbsp;" : char);
                }
                code += char;
            }
            document.getElementById("output").innerHTML = visual;
            document.getElementById("shareableCode").value = btoa(code);
        }

        function decode() {
            try {
                let encrypted = document.getElementById("inputCode").value;
                if(!encrypted) return;
                let decrypted = atob(encrypted).toUpperCase();
                let visual = ""; let text = "";
                for (let char of decrypted) {
                    visual += symbols[char] ? `<span class="symbol">${symbols[char]}</span>` : (char === " " ? "&nbsp;&nbsp;" : char);
                    text += char;
                }
                document.getElementById("decodedSymbols").innerHTML = visual;
                document.getElementById("decodedOutput").innerText = text;
            } catch(e) { document.getElementById("decodedOutput").innerText = "Invalid format"; }
        }

        /* --- LOGIC: AI SCANNING --- */
        let checkCV = setInterval(() => {
            if (typeof cv !== 'undefined' && cv.Mat) {
                document.getElementById('status').innerText = "AI Ready ✅";
                document.getElementById('status').style.background = "#e6f4ea";
                document.getElementById('camBtn').disabled = false;
                clearInterval(checkCV);
            }
        }, 1000);

        function processImage(input) {
            if (!input.files[0]) return;
            const img = new Image();
            img.src = URL.createObjectURL(input.files[0]);
            img.onload = function() {
                let src = cv.imread(img);
                // Resize for consistency
                let scale = 800 / src.cols;
                cv.resize(src, src, new cv.Size(800, src.rows * scale), 0, 0, cv.INTER_AREA);
                
                let gray = new cv.Mat();
                let thresh = new cv.Mat();
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                
                // Adaptive thresholding helps with shadows on paper
                cv.adaptiveThreshold(gray, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 21, 6);
                
                let M = cv.Mat.ones(3, 3, cv.CV_8U);
                cv.dilate(thresh, thresh, M, new cv.Point(-1, -1), 1);
                
                let contours = new cv.MatVector();
                let hierarchy = new cv.Mat();
                cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
                
                let found = [];
                for (let i = 0; i < contours.size(); ++i) {
                    let rect = cv.boundingRect(contours.get(i));
                    // Filter out noise (too small) or the whole page (too big)
                    if (rect.width > 25 && rect.height > 25 && rect.width < 300) {
                        let roi = thresh.roi(rect);
                        let padded = new cv.Mat();
                        cv.copyMakeBorder(roi, padded, 15, 15, 15, 15, cv.BORDER_CONSTANT, [0,0,0,255]);
                        cv.resize(padded, padded, new cv.Size(60, 60));
                        
                        let key = analyzeHandwriting(padded);
                        found.push({ x: rect.x, char: aiSymbolMap[key] || "?" });
                        
                        cv.rectangle(src, new cv.Point(rect.x, rect.y), new cv.Point(rect.x+rect.width, rect.y+rect.height), [0, 255, 0, 255], 2);
                        roi.delete(); padded.delete();
                    }
                }
                
                found.sort((a, b) => a.x - b.x);
                document.getElementById("scanResult").innerText = found.map(f => f.char).join("");
                document.getElementById("canvasOutput").style.display = "block";
                cv.imshow('canvasOutput', src);
                
                src.delete(); gray.delete(); thresh.delete(); contours.delete(); hierarchy.delete(); M.delete();
            };
        }

        function analyzeHandwriting(norm) {
            const getDensity = (x, y, w, h) => {
                let zone = norm.roi({x, y, width: w, height: h});
                let p = cv.countNonZero(zone);
                zone.delete();
                return p / (w * h);
            };

            // Detect edges (Top, Right, Bottom, Left)
            const lines = [
                getDensity(10, 0, 40, 15) > 0.12 ? 1 : 0,  
                getDensity(45, 10, 15, 40) > 0.12 ? 1 : 0, 
                getDensity(10, 45, 40, 15) > 0.12 ? 1 : 0, 
                getDensity(0, 10, 15, 40) > 0.12 ? 1 : 0   
            ];

            // Distinguish Triangle (J-M) from Square by checking corners
            // Squares have content in corners; Triangles usually don't at the top/bottom edges
            const cornerDensity = getDensity(0,0,12,12) + getDensity(48,0,12,12);
            const isTriangle = cornerDensity < 0.06;

            // Detect Dot in the center
            const hasDot = getDensity(22, 22, 16, 16) > 0.07;

            let key = lines.join(',') + "," + (hasDot ? 1 : 0);
            if (isTriangle) key += "_T";
            return key;
        }

        function copyToClipboard(id) {
            const copyText = document.getElementById(id);
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
            alert("Scrambled code copied!");
        }
    </script>
</body>
</html>
