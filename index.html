<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI Symbol Translator & Scanner</title>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; line-height: 1.6; max-width: 800px; margin: auto; background-color: #f0f2f5; }
        section { margin-bottom: 20px; padding: 20px; border-radius: 8px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #output, #decodedOutput, #scannerStatus { margin-top: 10px; min-height: 50px; padding: 15px; border: 1px solid #ddd; background: #f9f9f9; border-radius: 4px; word-wrap: break-word; }
        .symbol { display: inline-block; margin: 2px; vertical-align: middle; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; margin: 5px 0; }
        button:hover { background: #0056b3; }
        input, textarea { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        #canvasOutput { width: 100%; max-width: 400px; border-radius: 8px; display: none; }
        video { width: 100%; max-width: 400px; border-radius: 8px; display: none; }
        .live-container { text-align: center; }
    </style>
</head>
<body>

<h2>🔐 Secure Symbol Translator & Scanner</h2>

<section>
    <h3>Step 1: Encode Message</h3>
    <input type="text" id="inputText" placeholder="Type message here..." oninput="encode()">
    <div id="output"></div>
    <p><strong>Copy this code:</strong></p>
    <textarea id="shareableCode" readonly rows="2" placeholder="Code will appear here..."></textarea>
    <button onclick="copyToClipboard('shareableCode')">Copy Secret Code</button>
</section>

<section class="live-container">
    <h3>Step 2: Live Camera Decoder</h3>
    <p>Point your camera at the symbols. (Requires HTTPS)</p>
    <video id="videoInput" playsinline></video>
    <canvas id="canvasOutput"></canvas>
    <div id="scannerStatus">Camera status: Standby</div>
    <button id="startCamBtn" onclick="startCamera()">Start Camera Scanner</button>
</section>

<section>
    <h3>Step 3: Manual Decode</h3>
    <textarea id="inputCode" rows="2" placeholder="Paste S1-S4... style code here" oninput="decode()"></textarea>
    <div id="decodedSymbols"></div>
    <div id="decodedOutput" style="font-weight: bold; color: #28a745; font-size: 1.2em;"></div>
</section>

<script>
const symbols = {
    A: square(false,true,true,false), B: square(false,true,true,true), C: square(false,false,true,true),
    D: square(true,true,true,false), E: square(true,true,true,true), F: square(true,false,true,true),
    G: square(true,true,false,false), H: square(true,true,false,true), I: square(true,false,false,true),
    J: triangle("down"), K: triangle("right"), L: triangle("left"), M: triangle("up"),
    N: square(false,true,true,false,true), O: square(false,true,true,true,true), P: square(false,false,true,true,true),
    Q: square(true,true,true,false,true), R: square(true,true,true,true,true), S: square(true,false,true,true,true),
    T: square(true,true,false,false,true), U: square(true,true,false,true,true), V: square(true,false,false,true,true),
    W: triangle("down", true), X: triangle("right", true), Y: triangle("left", true), Z: triangle("up", true)
};

function square(top, right, bottom, left, dot=false) {
    let lines = "";
    if (top) lines += `<line x1="5" y1="5" x2="35" y2="5"/>`;
    if (right) lines += `<line x1="35" y1="5" x2="35" y2="35"/>`;
    if (bottom) lines += `<line x1="5" y1="35" x2="35" y2="35"/>`;
    if (left) lines += `<line x1="5" y1="5" x2="5" y2="35"/>`;
    let dotSvg = dot ? `<circle cx="20" cy="20" r="3" fill="black"/>` : "";
    return `<svg width="40" height="40" stroke="black" stroke-width="3" fill="none">${lines}${dotSvg}</svg>`;
}

function triangle(type, dot=false) {
    let lines = "";
    if (type === "up") lines += `<line x1="20" y1="5" x2="5" y2="35"/><line x1="20" y1="5" x2="35" y2="35"/>`;
    if (type === "right") lines += `<line x1="5" y1="5" x2="35" y2="20"/><line x1="5" y1="35" x2="35" y2="20"/>`;
    if (type === "left") lines += `<line x1="35" y1="5" x2="5" y2="20"/><line x1="35" y1="35" x2="5" y2="20"/>`;
    if (type === "down") lines += `<line x1="5" y1="5" x2="20" y2="35"/><line x1="35" y1="5" x2="20" y2="35"/>`;
    let dotSvg = dot ? `<circle cx="20" cy="20" r="3" fill="black"/>` : "";
    return `<svg width="40" height="40" stroke="black" stroke-width="3" fill="none">${lines}${dotSvg}</svg>`;
}

// --- Encoding Logic ---
function encode() {
    let text = document.getElementById("inputText").value.toUpperCase();
    let visualOutput = "";
    let shareableCode = "";
    for (let char of text) {
        if (symbols[char]) {
            visualOutput += `<span class="symbol">${symbols[char]}</span>`;
            shareableCode += char; 
        } else {
            visualOutput += char === " " ? `<span class="symbol">&nbsp;&nbsp;</span>` : char;
            shareableCode += char;
        }
    }
    document.getElementById("output").innerHTML = visualOutput;
    document.getElementById("shareableCode").value = btoa(shareableCode);
}

// --- Manual Decoding Logic ---
function decode() {
    try {
        let encrypted = document.getElementById("inputCode").value;
        if(!encrypted) return;
        let decrypted = atob(encrypted);
        let visualOutput = "";
        let textOutput = "";
        for (let char of decrypted) {
            if (symbols[char]) {
                visualOutput += `<span class="symbol">${symbols[char]}</span>`;
                textOutput += char;
            } else {
                visualOutput += char === " " ? `<span class="symbol">&nbsp;&nbsp;</span>` : char;
                textOutput += char;
            }
        }
        document.getElementById("decodedSymbols").innerHTML = visualOutput;
        document.getElementById("decodedOutput").innerText = textOutput;
    } catch(e) {
        document.getElementById("decodedOutput").innerText = "Invalid code format.";
    }
}

// --- Camera & Computer Vision Logic ---
let streaming = false;
function startCamera() {
    const video = document.getElementById('videoInput');
    const canvas = document.getElementById('canvasOutput');
    const status = document.getElementById('scannerStatus');
    
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false })
        .then(function(stream) {
            video.srcObject = stream;
            video.play();
            video.style.display = "inline-block";
            canvas.style.display = "inline-block";
            document.getElementById('startCamBtn').style.display = "none";
            streaming = true;
            status.innerText = "Analyzing shapes...";
            processVideo();
        })
        .catch(function(err) {
            console.log("An error occurred: " + err);
            status.innerText = "Error: Camera access denied.";
        });
}

function processVideo() {
    if (!streaming) return;
    
    let video = document.getElementById('videoInput');
    let src = new cv.Mat(video.height, video.width, cv.CV_8UC4);
    let dst = new cv.Mat(video.height, video.width, cv.CV_8UC1);
    let cap = new cv.VideoCapture(video);

    const FPS = 30;
    function process() {
        if (!streaming) return;
        cap.read(src);
        cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);
        cv.threshold(dst, dst, 100, 255, cv.THRESH_BINARY_INV);
        
        // This is where you'd add contour detection to match symbols
        // For this demo, we display the processed "Binary" feed 
        // showing what the AI sees (Black/White shapes)
        
        cv.imshow('canvasOutput', dst);
        setTimeout(process, 1000 / FPS);
    }
    process();
}

function copyToClipboard(id) {
    const copyText = document.getElementById(id);
    copyText.select();
    navigator.clipboard.writeText(copyText.value);
    alert("Code copied!");
}
</script>

</body>
</html>
