<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Symbol Suite: Fixed Visuals</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px; line-height: 1.6; max-width: 800px; margin: auto;
            background-color: #f0f2f5; color: #333; 
        }
        h1, h2 {
            text-align: center; color: #1a73e8; 
        }
        section {
            margin-bottom: 25px; padding: 25px; border-radius: 12px; background:
            #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
        }
        input, textarea { 
            width: 100%; padding: 12px; box-sizing: border-box;
            border: 1px solid #ccc; border-radius: 6px; font-size: 16px;
            margin-top: 8px; 
        }
        button {
            padding: 12px 20px; cursor: pointer; background: #1a73e8; color:
            white; border: none; border-radius: 6px; font-weight: bold; width:
            100%; margin-top: 10px; transition: 0.3s; 
        }
        button:hover { 
            background: #1557b0; 
        }
        button:disabled { 
            background: #ccc; cursor: not-allowed; 
        }
        .secondary-btn {
            background: #5f6368;
        }
        .secondary-btn:hover {
            background: #3c4043;
        }
        #output, #decodedSymbols, #scanResult { 
            margin-top: 15px; min-height: 50px;
            padding: 15px; border: 1px solid #eee; background: #fafafa;
            border-radius: 8px; word-wrap: break-word; 
        }
        .symbol {
            display: inline-block; margin: 4px; vertical-align: middle; 
        }
        #canvasOutput { 
            width: 100%; border-radius: 8px; margin-top: 10px;
            display: none; border: 2px solid #1a73e8; 
        }
        #scanResult { 
            font-size: 40px; color: #1e8e3e; font-weight: bold; text-align:
            center; letter-spacing: 5px; min-height: 60px; 
        }
        .status-badge { 
            display: inline-block; padding: 5px 12px;
            border-radius: 20px; font-size: 12px; background: #eee;
            margin-bottom: 10px; 
        }
        .label {
            font-weight: bold; display: block; margin-top: 15px; font-size:
            0.9em; color: #666; 
        }
    </style>
</head>
<body>

    <h1>🔐 Symbol Translator Pro</h1>

    <section>
        <h2>Step 1: Encode Message</h2>
        <input type="text" id="inputText" placeholder="Type message here..." oninput="encode()">
        <span class="label">Visual Symbols:</span>
        <div id="output"></div>
        <span class="label">Secret Scrambled Code:</span>
        <textarea id="shareableCode" readonly rows="2"></textarea>
        <button onclick="copyToClipboard('shareableCode')">Copy Secret Code</button>
    </section>

    <section>
        <h2>Step 2: Decode Message</h2>
        <textarea id="inputCode" rows="2" placeholder="Paste scrambled code here..." oninput="decode()"></textarea>
        <button onclick="pasteFromClipboard('inputCode')" class="secondary-btn">📋 Paste Scrambled Code</button>
        <div id="decodedSymbols"></div>
        <div id="decodedOutput" style="font-weight: bold; color: #28a745; font-size: 1.5em; text-align: center; margin-top: 10px;"></div>
    </section>

    <section>
        <h2>Step 3: AI Image Scan</h2>
        <div id="status" class="status-badge">⏳ Loading AI...</div>
        <button id="camBtn" disabled onclick="document.getElementById('fileInput').click()">📸 Upload Symbol Image</button>
        <!-- Removed capture="camera" to allow file selection on mobile devices -->
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="processImage(this)">
        <canvas id="canvasOutput"></canvas>
        <div id="scanResult"></div>
    </section>

    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript"></script>

    <script>
        // ORIGINAL VISUAL RENDERING (Fixed Triangles)
        function square(top, right, bottom, left, dot=false) {
            let lines = "";
            if (top) lines += `<line x1="5" y1="5" x2="35" y2="5"/>`;
            if (right) lines += `<line x1="35" y1="5" x2="35" y2="35"/>`;
            if (bottom) lines += `<line x1="5" y1="35" x2="35" y2="35"/>`;
            if (left) lines += `<line x1="5" y1="5" x2="5" y2="35"/>`;
            let dotSvg = dot ? `<circle cx="20" cy="20" r="3" fill="black"/>` : "";
            return `<svg width="40" height="40" stroke="black" stroke-width="3" fill="none">${lines}${dotSvg}</svg>`;
        }

        function triangle(type, dot=false) {
            let lines = "";
            if (type === "up") lines += `<line x1="20" y1="5" x2="5" y2="35"/><line x1="20" y1="5" x2="35" y2="35"/>`;
            if (type === "right") lines += `<line x1="5" y1="5" x2="35" y2="20"/><line x1="5" y1="35" x2="35" y2="20"/>`;
            if (type === "left") lines += `<line x1="35" y1="5" x2="5" y2="20"/><line x1="35" y1="35" x2="5" y2="20"/>`;
            if (type === "down") lines += `<line x1="5" y1="5" x2="20" y2="35"/><line x1="35" y1="5" x2="20" y2="35"/>`;
            let dotSvg = dot ? `<circle cx="20" cy="20" r="3" fill="black"/>` : "";
            return `<svg width="40" height="40" stroke="black" stroke-width="3" fill="none">${lines}${dotSvg}</svg>`;
        }

        const symbols = {
            A: square(0,1,1,0), B: square(0,1,1,1), C: square(0,0,1,1),
            D: square(1,1,1,0), E: square(1,1,1,1), F: square(1,0,1,1),
            G: square(1,1,0,0), H: square(1,1,0,1), I: square(1,0,0,1),
            J: triangle("down"), K: triangle("right"), L: triangle("left"), M: triangle("up"),
            N: square(0,1,1,0,1), O: square(0,1,1,1,1), P: square(0,0,1,1,1),
            Q: square(1,1,1,0,1), R: square(1,1,1,1,1), S: square(1,0,1,1,1),
            T: square(1,1,0,0,1), U: square(1,1,0,1,1), V: square(1,0,0,1,1),
            W: triangle("down", true), X: triangle("right", true), Y: triangle("left", true), Z: triangle("up", true)
        };

        const aiSymbolMap = {
            "0,1,1,0,0": "A", "0,1,1,1,0": "B", "0,0,1,1,0": "C",
            "1,1,1,0,0": "D", "1,1,1,1,0": "E", "1,0,1,1,0": "F",
            "1,1,0,0,0": "G", "1,1,0,1,0": "H", "1,0,0,1,0": "I",
            "tri_down,0": "J", "tri_right,0": "K", "tri_left,0": "L", "tri_up,0": "M",
            "0,1,1,0,1": "N", "0,1,1,1,1": "O", "0,0,1,1,1": "P",
            "1,1,1,0,1": "Q", "1,1,1,1,1": "R", "1,0,1,1,1": "S",
            "1,1,0,0,1": "T", "1,1,0,1,1": "U", "1,0,0,1,1": "V",
            "tri_down,1": "W", "tri_right,1": "X", "tri_left,1": "Y", "tri_up,1": "Z"
        };

        function renderVisualChar(char) {
            if (symbols[char]) {
                return `<span class="symbol">${symbols[char]}</span>`;
            } else if (char === " ") {
                return `<span class="symbol" style="width: 25px;"></span>`;
            } else {
                return `<span class="symbol" style="height: 40px; line-height: 40px; text-align: center; font-size: 26px; font-weight: bold; color: #555; padding: 0 5px;">${char}</span>`;
            }
        }

        function encode() {
            let text = document.getElementById("inputText").value.toUpperCase();
            let visual = ""; let code = "";
            for (let char of text) {
                visual += renderVisualChar(char);
                code += char;
            }
            document.getElementById("output").innerHTML = visual;
            document.getElementById("shareableCode").value = btoa(encodeURIComponent(code));
        }

        function decode() {
            try {
                let decrypted = decodeURIComponent(atob(document.getElementById("inputCode").value)).toUpperCase();
                let visual = "";
                for (let char of decrypted) {
                    visual += renderVisualChar(char);
                }
                document.getElementById("decodedSymbols").innerHTML = visual;
                document.getElementById("decodedOutput").innerText = decrypted;
            } catch(e) { 
                try {
                    let decrypted = atob(document.getElementById("inputCode").value).toUpperCase();
                    let visual = "";
                    for (let char of decrypted) visual += renderVisualChar(char);
                    document.getElementById("decodedSymbols").innerHTML = visual;
                    document.getElementById("decodedOutput").innerText = decrypted;
                } catch(err) {
                    document.getElementById("decodedOutput").innerText = "Invalid format"; 
                }
            }
        }

        let checkCV = setInterval(() => {
            if (typeof cv !== 'undefined' && cv.Mat) {
                document.getElementById('status').innerText = "AI Ready ✅";
                document.getElementById('camBtn').disabled = false;
                clearInterval(checkCV);
            }
        }, 1000);

        function processImage(input) {
            if (!input.files[0]) return;
            const img = new Image();
            img.src = URL.createObjectURL(input.files[0]);
            img.onload = function() {
                let src = cv.imread(img);
                let scale = 800 / src.cols;
                cv.resize(src, src, new cv.Size(800, src.rows * scale), 0, 0, cv.INTER_AREA);
                
                let gray = new cv.Mat(), thresh = new cv.Mat();
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                cv.adaptiveThreshold(gray, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 21, 6);
                
                let contours = new cv.MatVector(), hierarchy = new cv.Mat();
                cv.findContours(thresh, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
                
                let found = [];
                for (let i = 0; i < contours.size(); ++i) {
                    let rect = cv.boundingRect(contours.get(i));
                    if (rect.width > 12 && rect.height > 12) {
                        let roi = thresh.roi(rect);
                        cv.resize(roi, roi, new cv.Size(60, 60));
                        let charKey = analyzeRobust(roi);
                        found.push({ x: rect.x, y: rect.y, w: rect.width, char: aiSymbolMap[charKey] || "?" });
                        roi.delete();
                    }
                }
                found.sort((a, b) => (Math.abs(a.y - b.y) > 40) ? a.y - b.y : a.x - b.x);

                let result = "";
                for (let i = 0; i < found.length; i++) {
                    result += found[i].char;
                    if (i < found.length - 1) {
                        let c = found[i], n = found[i+1];
                        if (Math.abs(c.y - n.y) < 40) {
                            if ((n.x - (c.x + c.w)) > c.w * 0.65) result += " ";
                        } else result += " ";
                    }
                }
                
                document.getElementById("scanResult").innerText = result;
                cv.imshow('canvasOutput', src);
                document.getElementById("canvasOutput").style.display = "block";
                
                src.delete(); gray.delete(); thresh.delete(); contours.delete(); hierarchy.delete();
            };
        }

        function analyzeRobust(m) {
            const getP = (x, y, w, h) => cv.countNonZero(m.roi({x,y,width:w,height:h}));
            let dot = getP(22,22,16,16) > 25 ? 1 : 0;
            
            let tl = getP(0,0,15,15);
            let tr = getP(45,0,15,15);
            let bl = getP(0,45,15,15);
            let br = getP(45,45,15,15);
            
            let topHalf = getP(0,0,60,30);
            let botHalf = getP(0,30,60,30);
            let leftHalf = getP(0,0,30,60);
            let rightHalf = getP(30,0,30,60);

            let empty = 20; 
            let full = 80;  

            if (tl < empty && tr < empty && botHalf > full) return `tri_up,${dot}`;
            if (bl < empty && br < empty && topHalf > full) return `tri_down,${dot}`;
            if (tl < empty && bl < empty && rightHalf > full) return `tri_left,${dot}`;
            if (tr < empty && br < empty && leftHalf > full) return `tri_right,${dot}`;

            let t = getP(15,0,30,10) > 40 ? 1 : 0;
            let r = getP(50,15,10,30) > 40 ? 1 : 0;
            let b = getP(15,50,30,10) > 40 ? 1 : 0;
            let l = getP(0,15,10,30) > 40 ? 1 : 0;

            return `${t},${r},${b},${l},${dot}`;
        }

        async function pasteFromClipboard(id) {
            try {
                const text = await navigator.clipboard.readText();
                const el = document.getElementById(id);
                el.value = text;
                decode(); // Trigger decoding immediately
            } catch (err) {
                alert("Please paste the code manually or allow clipboard access.");
            }
        }

        function copyToClipboard(id) {
            const el = document.getElementById(id);
            el.select();
            document.execCommand('copy');
            alert("Copied!");
        }
    </script>
</body>
</html>
