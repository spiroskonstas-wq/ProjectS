<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🔐 Symbol Translator & Scanner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 15px; background-color: #f0f2f5; max-width: 600px; margin: auto; }
        section { margin-bottom: 15px; padding: 20px; border-radius: 12px; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .symbol { display: inline-block; margin: 2px; vertical-align: middle; }
        button { padding: 12px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 6px; font-weight: bold; width: 100%; margin: 5px 0; }
        input, textarea { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; margin-top: 8px; }
        video, canvas { width: 100%; border-radius: 8px; margin-top: 10px; display: none; background: #000; }
        #status { font-size: 0.9em; color: #666; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

<h2>🔐 Symbol Messenger</h2>

<section>
    <h3>Step 1: Encode</h3>
    <input type="text" id="inputText" placeholder="Type message..." oninput="encode()">
    <div id="output" style="padding: 10px; min-height: 40px;"></div>
    <textarea id="shareableCode" readonly rows="2" placeholder="Base64 will appear here..."></textarea>
    <button onclick="copyToClipboard('shareableCode')">Copy Secret Code</button>
</section>

<section>
    <h3>Step 2: Decode via Camera</h3>
    <div id="status">Status: Waiting for input</div>
    
    <button onclick="startLiveScanner()">Option A: Open Live Scanner</button>
    <video id="videoInput" playsinline></video>
    
    <button onclick="document.getElementById('fileInput').click()" style="background: #28a745;">Option B: Take a Photo</button>
    <input type="file" id="fileInput" accept="image/*" capture="camera" style="display:none" onchange="handlePhoto(this)">
    
    <canvas id="canvasOutput"></canvas>
</section>

<section>
    <h3>Step 3: Manual Entry</h3>
    <textarea id="inputCode" rows="2" placeholder="Paste code here..." oninput="decode()"></textarea>
    <div id="decodedOutput" style="font-weight: bold; color: #28a745; margin-top: 10px;"></div>
</section>

<script>
// Your Original Symbol Library
const symbols = {
    A: square(false,true,true,false), B: square(false,true,true,true), C: square(false,false,true,true),
    D: square(true,true,true,false), E: square(true,true,true,true), F: square(true,false,true,true),
    G: square(true,true,false,false), H: square(true,true,false,true), I: square(true,false,false,true),
    J: triangle("down"), K: triangle("right"), L: triangle("left"), M: triangle("up"),
    N: square(false,true,true,false,true), O: square(false,true,true,true,true), P: square(false,false,true,true,true),
    Q: square(true,true,true,false,true), R: square(true,true,true,true,true), S: square(true,false,true,true,true),
    T: square(true,true,false,false,true), U: square(true,true,false,true,true), V: square(true,false,false,true,true),
    W: triangle("down", true), X: triangle("right", true), Y: triangle("left", true), Z: triangle("up", true)
};

function square(t, r, b, l, d=false) {
    let lines = "";
    if (t) lines += `<line x1="5" y1="5" x2="35" y2="5"/>`;
    if (r) lines += `<line x1="35" y1="5" x2="35" y2="35"/>`;
    if (b) lines += `<line x1="5" y1="35" x2="35" y2="35"/>`;
    if (l) lines += `<line x1="5" y1="5" x2="5" y2="35"/>`;
    let dot = d ? `<circle cx="20" cy="20" r="3" fill="black"/>` : "";
    return `<svg width="40" height="40" stroke="black" stroke-width="3" fill="none">${lines}${dot}</svg>`;
}

function triangle(type, d=false) {
    let l = "";
    if (type === "up") l += `<line x1="20" y1="5" x2="5" y2="35"/><line x1="20" y1="5" x2="35" y2="35"/>`;
    if (type === "right") l += `<line x1="5" y1="5" x2="35" y2="20"/><line x1="5" y1="35" x2="35" y2="20"/>`;
    if (type === "left") l += `<line x1="35" y1="5" x2="5" y2="20"/><line x1="35" y1="35" x2="5" y2="20"/>`;
    if (type === "down") l += `<line x1="5" y1="5" x2="20" y2="35"/><line x1="35" y1="5" x2="20" y2="35"/>`;
    let dot = d ? `<circle cx="20" cy="20" r="3" fill="black"/>` : "";
    return `<svg width="40" height="40" stroke="black" stroke-width="3" fill="none">${l}${dot}</svg>`;
}

// Logic functions
function encode() {
    let text = document.getElementById("inputText").value.toUpperCase();
    let visual = ""; let code = "";
    for (let char of text) {
        if (symbols[char]) { visual += `<span class="symbol">${symbols[char]}</span>`; code += char; }
        else { visual += char; code += char; }
    }
    document.getElementById("output").innerHTML = visual;
    document.getElementById("shareableCode").value = btoa(code);
}

function decode() {
    try {
        let res = atob(document.getElementById("inputCode").value);
        document.getElementById("decodedOutput").innerText = "Decoded: " + res;
    } catch(e) { document.getElementById("decodedOutput").innerText = ""; }
}

// Camera Functions
async function startLiveScanner() {
    const video = document.getElementById('videoInput');
    const status = document.getElementById('status');
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
        video.style.display = "block";
        status.innerText = "Live Stream Active";
    } catch (err) {
        status.innerText = "Error: Access Denied. Check permissions.";
    }
}

function handlePhoto(input) {
    const status = document.getElementById('status');
    if (input.files && input.files[0]) {
        status.innerText = "Photo received! Processing logic required...";
        // This confirms the connection works. 
        // Actual Computer Vision processing requires training OpenCV to recognize your SVG shapes.
    }
}

function copyToClipboard(id) {
    const el = document.getElementById(id);
    el.select();
    navigator.clipboard.writeText(el.value);
    alert("Copied!");
}
</script>
</body>
</html>
