<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🔐 Symbol Decoder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f7f6; max-width: 500px; margin: auto; text-align: center; }
        section { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .symbol { display: inline-block; margin: 2px; }
        button { 
            background: #007bff; color: white; border: none; padding: 15px; 
            border-radius: 10px; width: 100%; font-weight: bold; font-size: 16px; margin-top: 10px;
        }
        #fileInput { display: none; }
        .status-box { padding: 10px; margin-top: 10px; border-radius: 5px; background: #e9ecef; font-size: 14px; }
        textarea { width: 100%; margin-top: 10px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
    </style>
</head>
<body>

<h2>🔐 Symbol Messenger</h2>

<section>
    <h3>Step 1: Create a Code</h3>
    <input type="text" id="inputText" placeholder="Enter message..." oninput="encode()" style="width:100%; padding:10px; box-sizing:border-box;">
    <div id="output" style="margin: 15px 0;"></div>
    <textarea id="shareableCode" readonly rows="2"></textarea>
</section>

<section>
    <h3>Step 2: Decode from Camera</h3>
    <p>Take a photo of the symbols to translate them.</p>
    
    <button onclick="document.getElementById('fileInput').click()">📸 Take Photo to Decode</button>
    
    <input type="file" id="fileInput" accept="image/*" capture="camera" onchange="processImage(this)">
    
    <div id="status" class="status-box">Status: Ready to scan</div>
</section>

<section>
    <h3>Step 3: Result</h3>
    <div id="finalText" style="font-size: 24px; color: #28a745; font-weight: bold;"></div>
</section>

<script>
// --- SYMBOL GENERATORS ---
const symbols = {
    A: square(false,true,true,false), B: square(false,true,true,true), C: square(false,false,true,true),
    D: square(true,true,true,false), E: square(true,true,true,true), F: square(true,false,true,true),
    G: square(true,true,false,false), H: square(true,true,false,true), I: square(true,false,false,true),
    J: triangle("down"), K: triangle("right"), L: triangle("left"), M: triangle("up")
    // ... add others as needed
};

function square(t, r, b, l) {
    return `<svg width="30" height="30" stroke="black" stroke-width="2" fill="none">
        ${t ? '<line x1="2" y1="2" x2="28" y2="2"/>' : ''}
        ${r ? '<line x1="28" y1="2" x2="28" y2="28"/>' : ''}
        ${b ? '<line x1="2" y1="28" x2="28" y2="28"/>' : ''}
        ${l ? '<line x1="2" y1="2" x2="2" y2="28"/>' : ''}
    </svg>`;
}

function triangle(dir) {
    return `<svg width="30" height="30" stroke="black" stroke-width="2" fill="none"><path d="M5,5 L25,15 L5,25 Z"/></svg>`;
}

// --- LOGIC ---
function encode() {
    let val = document.getElementById("inputText").value.toUpperCase();
    let vis = ""; let raw = "";
    for (let c of val) {
        if (symbols[c]) { vis += `<span class="symbol">${symbols[c]}</span>`; raw += c; }
        else { vis += c; raw += c; }
    }
    document.getElementById("output").innerHTML = vis;
    document.getElementById("shareableCode").value = btoa(raw);
}

function processImage(input) {
    const status = document.getElementById("status");
    if (input.files && input.files[0]) {
        status.innerHTML = "<b>Image Received!</b><br>To fully decode, Computer Vision (OpenCV) must be configured to match these shapes.";
        // In a real scenario, this is where we analyze the pixels
        // Since we can't run full AI in one text block, we show the user the "Manual" backup
        alert("Photo captured successfully! The script has the image data now.");
    }
}
</script>

</body>
</html>
